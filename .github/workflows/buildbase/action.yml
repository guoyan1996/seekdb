name: "Build base"

inputs:
  save_cache:
    description: 'whether to save ccache to github action cache'
    required: true
  os:
    description: 'which runner os to run this build action'
    required: true

runs:
  using: "composite"
  steps:
    - name: Build init
      shell: bash
      run: |
        bash build.sh init
        echo "$GITHUB_WORKSPACE/deps/3rd/usr/local/oceanbase/devtools/bin" >> $GITHUB_PATH

    # on centos7, we cannot use the latest `node`.
    # ccache-action@v1.2 uses `node20` which cannot works on centos7 but node16 works fun
    - name: Setup ccache
      uses: hendrikmuhs/ccache-action@v1.2.11
      with:
        max-size: 800M
        save: ${{inputs.save_cache}}
        key: ${{inputs.os}}

    - name: Build project
      shell: bash
      run: |
        bash build.sh debug -DOB_USE_CCACHE=ON
        ccache -z
        cd build_debug && make -j4
        ccache -s

    - name: Build libseekdb
      shell: bash
      run: |
        bash build.sh release -DOB_USE_CCACHE=ON -DBUILD_EMBED_MODE=ON
        ccache -z
        cd build_release && make -j4 seekdb
        ccache -s

    - name: Test Node.js FFI binding
      shell: bash
      run: |
        cd unittest/include/nodejs
        npm install
        bash test.sh
    
    - name: Test Node.js N-API binding
      shell: bash
      run: |
        cd unittest/include/nodejs_napi
        npm install
        bash test.sh

    - name: Test Python binding
      shell: bash
      run: |
        cd unittest/include/python
        bash test.sh

    - name: Test Rust binding
      shell: bash
      run: |
        cd unittest/include/rust
        bash test.sh

    - name: Test Go binding
      shell: bash
      run: |
        cd unittest/include/go
        bash test.sh
